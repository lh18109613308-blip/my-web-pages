<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>刘子的待办清单</title>
    <link rel="stylesheet" href="styles.css?v=liuzi-pink-20260626-1" />
  </head>
  <body>
    <main class="app" aria-label="刘子的待办清单">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Sweet Todo Desk</p>
          <h1>刘子的待办清单</h1>
          <p class="subtitle">粉色能量补给站：小女孩和三个任务伙伴一起陪你把事情做完。</p>
        </div>
        <div class="girl-stage" id="mascot" aria-label="刘子的卡通小女孩和任务伙伴">
          <div class="confetti"></div>
          <div class="pixel-girl">
            <div class="girl-hair"></div>
            <div class="girl-face"><span></span></div>
            <div class="girl-body"></div>
          </div>
          <div class="hero-buddy buddy-kitty" title="紧急任务伙伴"></div>
          <div class="hero-buddy buddy-bear" title="普通任务伙伴"></div>
          <div class="hero-buddy buddy-dora" title="轻松任务伙伴"></div>
        </div>
      </section>
      <div class="barrage-layer" id="barrage-layer" aria-live="polite"></div>

      <section class="layout-control panel" aria-label="布局调整">
        <button class="ghost" id="reset-layout" type="button">恢复默认布局</button>
        <p>拖动每个板块标题栏调整位置，拖动右下角调整大小。布局会自动保存。</p>
      </section>

      <section class="workspace" id="workspace" aria-label="自定义工作台">
        <section class="panel widget board" data-widget="board">
          <div class="widget-header board-header" data-drag-handle>
            <div><h2>任务列表</h2><p id="task-count">0 项任务</p></div>
            <div class="filter-stack">
              <div class="filters" aria-label="状态筛选">
                <button class="filter active" type="button" data-status-filter="all">全部</button>
                <button class="filter" type="button" data-status-filter="not-started">未开始</button>
                <button class="filter" type="button" data-status-filter="in-progress">进行中</button>
                <button class="filter" type="button" data-status-filter="done">已完成</button>
              </div>
              <div class="filters" aria-label="优先级筛选">
                <button class="filter active" type="button" data-priority-filter="all">全部优先级</button>
                <button class="filter" type="button" data-priority-filter="high">紧急</button>
                <button class="filter" type="button" data-priority-filter="medium">普通</button>
                <button class="filter" type="button" data-priority-filter="low">轻松</button>
              </div>
            </div>
          </div>
          <ul class="task-list" id="task-list" aria-live="polite"></ul>
          <div class="resize-grip" data-resize-grip></div>
        </section>

        <section class="panel widget calendar-panel" data-widget="calendar">
          <div class="widget-header calendar-header" data-drag-handle>
            <div><h2>日历安排</h2><p id="calendar-range">显示已安排时间的任务</p></div>
            <div class="calendar-tools">
              <select id="calendar-mode" aria-label="日历范围">
                <option value="week">一周</option>
                <option value="month" selected>一个月</option>
                <option value="quarter">三个月摘要</option>
                <option value="year">一年摘要</option>
              </select>
              <div class="calendar-actions">
                <button class="ghost" id="prev-period" type="button">上一段</button>
                <button class="ghost" id="current-period" type="button">回到今天</button>
                <button class="ghost" id="next-period" type="button">下一段</button>
              </div>
            </div>
          </div>
          <div class="calendar" id="calendar"></div>
          <div class="resize-grip" data-resize-grip></div>
        </section>

        <aside class="panel widget composer" data-widget="composer">
          <div class="widget-header panel-title" data-drag-handle>
            <h2 id="form-title">添加任务</h2>
            <button class="ghost hidden" id="cancel-edit" type="button">取消编辑</button>
          </div>
          <form id="task-form" class="task-form">
            <label>待办事项<input id="task-input" type="text" maxlength="120" placeholder="例如：整理实验记录" required /></label>
            <div class="form-grid">
              <label>优先级<select id="priority-input"><option value="high">紧急</option><option value="medium" selected>普通</option><option value="low">轻松</option></select></label>
              <label>状态<select id="status-input"><option value="not-started" selected>未开始</option><option value="in-progress">进行中</option><option value="done">已完成</option></select></label>
            </div>
            <label>安排时间<input id="time-input" type="datetime-local" /></label>
            <button class="primary" type="submit" id="submit-button">添加到清单</button>
          </form>
          <div class="resize-grip" data-resize-grip></div>
        </aside>

        <section class="panel widget backup-panel" data-widget="backup">
          <div class="widget-header panel-title compact" data-drag-handle>
            <div><h2>储存与备份</h2><p id="last-saved">尚未保存</p></div>
          </div>
          <div class="backup-actions">
            <button class="ghost" id="export-data" type="button">导出备份</button>
            <button class="ghost" id="import-trigger" type="button">导入备份</button>
            <input class="hidden" id="import-file" type="file" accept="application/json,.json" />
          </div>
          <div class="resize-grip" data-resize-grip></div>
        </section>
      </section>
    </main>
    <script src="script.js?v=liuzi-pink-20260626-1"></script>
  </body>
</html>
